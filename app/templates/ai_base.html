<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AI Commerce OS{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="ai-os-body">
    <div class="ai-os-layout">
        <aside class="ai-sidebar">
            <div class="brand-row">
                <div class="brand-mark">A</div>
                <strong>AI Commerce OS</strong>
            </div>
            <nav class="side-nav">
                <a class="{% if active_nav == 'dashboard' %}active{% endif %}" href="/dashboard">
                    <span>🏠</span> 工作台
                </a>
                <a class="{% if active_nav == 'selection' %}active{% endif %}" href="/ai-selection">
                    <span>📦</span> AI选品
                </a>
                <a class="{% if active_nav == 'products' %}active{% endif %}" href="/products">
                    <span>📚</span> 商品库
                </a>
                <a class="{% if active_nav == 'suppliers' %}active{% endif %}" href="/suppliers">
                    <span>🏭</span> 供应商库
                </a>
                <a class="{% if active_nav == 'analytics' %}active{% endif %}" href="/data-center">
                    <span>📊</span> 数据中心
                </a>
                <a class="{% if active_nav == 'settings' %}active{% endif %}" href="/ai-score-config">
                    <span>⚙</span> 系统设置
                </a>
            </nav>
            <div class="sidebar-user">
                <div class="avatar">D</div>
                <div>
                    <strong>Demo User</strong>
                    <span>admin@aios.com</span>
                </div>
            </div>
        </aside>

        <div class="ai-main">
            <header class="ai-topbar">
                <button class="icon-button" type="button">☰</button>
                <div></div>
                <div class="top-actions">
                    <span id="worker-client-badge" title="采集客户端 ID"></span>
                    <span>🔍</span>
                    <span>🔔</span>
                    <span>?</span>
                    <div class="mini-avatar">D</div>
                </div>
            </header>
            <main class="ai-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script>
        function getWorkerClientId() {
            const storageKey = "ai_commerce_worker_client_id";
            let clientId = localStorage.getItem(storageKey);
            if (!clientId) {
                clientId = `client-${Math.random().toString(36).slice(2, 8)}-${Date.now().toString(36).slice(-4)}`;
                localStorage.setItem(storageKey, clientId);
            }
            return clientId;
        }

        function appendWorkerClientId(url) {
            const nextUrl = new URL(url, window.location.origin);
            nextUrl.searchParams.set("worker_client_id", getWorkerClientId());
            return `${nextUrl.pathname}${nextUrl.search}`;
        }

        window.getWorkerClientId = getWorkerClientId;
        window.appendWorkerClientId = appendWorkerClientId;

        document.querySelectorAll('form[action="/ai-selection/tasks"]').forEach((form) => {
            form.addEventListener("submit", () => {
                let input = form.querySelector('input[name="worker_client_id"]');
                if (!input) {
                    input = document.createElement("input");
                    input.type = "hidden";
                    input.name = "worker_client_id";
                    form.appendChild(input);
                }
                input.value = getWorkerClientId();
            });
        });

        const workerBadge = document.getElementById("worker-client-badge");
        if (workerBadge) {
            workerBadge.textContent = `采集端 ${getWorkerClientId()}`;
        }
    </script>
</body>
</html>
